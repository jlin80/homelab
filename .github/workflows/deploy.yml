name: Homelab Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: [self-hosted, homelab]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        run: |
          mkdir -p /tmp/runner/bin
          if [ ! -f /tmp/runner/bin/kubectl ]; then
            curl -LO "https://dl.k8s.io/release/v1.36.2/bin/linux/amd64/kubectl"
            chmod +x kubectl
            mv kubectl /tmp/runner/bin/kubectl
          fi
          echo "/tmp/runner/bin" >> $GITHUB_PATH

      - name: Verificar Docker
        run: docker --version

      - name: Pull imagenes
        run: docker compose -f /root/monitoring/docker-compose.yml pull

      - name: Desplegar stack Docker
        run: |
          docker compose -f /root/monitoring/docker-compose.yml up -d --remove-orphans \
            prometheus \
            grafana \
            blackbox-exporter \
            pihole-exporter \
            homepage \
            node-exporter

      - name: Configurar kubectl
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_K3S }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Verificar conexion k3s
        run: kubectl get nodes

      - name: Desplegar manifiestos en k3s
        run: kubectl apply -f k8s/ -n portfolio

      - name: Verificar pods en k3s
        run: kubectl get pods -n portfolio

      - name: Contenedores Docker activos
        run: docker ps
