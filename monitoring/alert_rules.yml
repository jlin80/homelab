groups:
  - name: homelab
    rules:
      - alert: ProbeDown
        expr: probe_success == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          description: "Servicio caido: {{ \.instance }}"

      - alert: CPUAlta
        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode='idle'}[5m])) * 100) > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          description: "CPU por encima del 80% en {{ \.instance }}"

      - alert: RAMAlta
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          description: "RAM por encima del 85% en {{ \.instance }}"

      - alert: PodCaidoK8s
        expr: kube_pod_status_phase{phase='Failed', namespace='portfolio'} > 0
        for: 1m
        labels:
          severity: critical
        annotations:
          description: "Pod caido en namespace portfolio: {{ \.pod }}"
